    <div id="root"></div>
    <script>
      (function handleGitHubPagesRedirect() {
        const query = window.location.search;
        if (!query.startsWith("?p=")) {
          return;
        }

        const params = new URLSearchParams(query);
        const path = (params.get("p") || "/").replace(/~and~/g, "&");
        const preservedQuery = params.get("q")
          ? "?" + params.get("q").replace(/~and~/g, "&")
          : "";

        window.history.replaceState(
          null,
          null,
          path + preservedQuery + window.location.hash
        );
      })();
    </script>
